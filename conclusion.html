<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Conclusion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    // Avant le 1er paint : si on arrive via un slide, le panneau doit déjà couvrir.
    (function () { if (sessionStorage.getItem('pf-slide')) document.documentElement.classList.add('pf-cover'); })();
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #000;
      background: #fff;
      user-select: none;
    }

    #conclusion {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px;
    }

    .cc-eyebrow {
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      margin-bottom: 18px;
    }
    .cc-title {
      font-size: clamp(2.6em, 7vw, 5em);
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 22px;
    }
    .cc-text {
      font-size: clamp(1em, 1.6vw, 1.25em);
      font-weight: 400;
      line-height: 1.6;
      color: rgba(0,0,0,0.55);
      max-width: 620px;
      margin-bottom: 12px;
    }
    .cc-placeholder {
      display: inline-block;
      margin-top: 18px;
      font-size: 0.74em;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.3);
      border: 1.5px dashed rgba(0,0,0,0.2);
      border-radius: 999px;
      padding: 8px 18px;
    }

    .cc-actions {
      display: flex;
      gap: 16px;
      margin-top: 48px;
    }
    .cc-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85em;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 13px 24px;
      border-radius: 999px;
      border: 1.5px solid #000;
      background: transparent;
      color: #000;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }
    .cc-btn:hover { transform: translateY(-2px); }
    .cc-btn.solid { background: #000; color: #fff; }
    .cc-btn svg { width: 16px; height: 16px; }

    /* Panneau de transition slide */
    #slide-panel {
      position: fixed; inset: 0; z-index: 300; background: #000;
      transform: translateX(100%); pointer-events: none;
    }
    html.pf-cover #slide-panel { transform: translateX(0); }
  </style>
</head>

<body>
  <div id="conclusion">
    <div class="cc-eyebrow">Et après ?</div>
    <h1 class="cc-title">Conclusion</h1>
    <p class="cc-text">C'est ici que je parlerai de mon avenir : la suite de mon parcours, mes ambitions et la direction que je veux donner à mes compétences.</p>
    <span class="cc-placeholder">Contenu à venir</span>

    <div class="cc-actions">
      <button class="cc-btn" id="cc-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Projets
      </button>
      <a class="cc-btn solid" id="cc-hub" href="index.html">Hub</a>
    </div>
  </div>

  <div id="slide-panel"></div>

  <script src="conclusion.js" type="module"></script>
</body>

</html>
