<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Compétence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script>
    // Avant le 1er paint : si on arrive via un slide, le panneau doit déjà couvrir.
    (function () { if (sessionStorage.getItem('pf-slide')) document.documentElement.classList.add('pf-cover'); })();
  </script>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #000;
      background: #fff;
      user-select: none;
    }

    #interlude {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px;
    }

    .il-wrap {
      width: 100%;
      max-width: 1120px;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .il-wrap.in {
      opacity: 1;
      transform: translateY(0);
    }

    /* En-tête */
    .il-eyebrow {
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.4);
      margin-bottom: 14px;
    }

    .il-index {
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 2px;
      color: rgba(0, 0, 0, 0.3);
    }

    .il-title {
      font-size: clamp(3em, 7vw, 5.6em);
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 0.95;
      margin-bottom: 18px;
    }

    .il-objective {
      font-size: clamp(1em, 1.6vw, 1.3em);
      font-weight: 400;
      line-height: 1.5;
      color: rgba(0, 0, 0, 0.6);
      max-width: 760px;
    }

    .il-divider {
      height: 1px;
      background: rgba(0, 0, 0, 0.12);
      margin: 40px 0 36px;
    }

    /* Colonnes AC / CE */
    .il-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
    }

    .il-col-label {
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.35);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1.5px solid #000;
    }

    .il-item {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .il-item:last-child {
      border-bottom: none;
    }

    .il-code {
      font-size: 0.82em;
      font-weight: 800;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 64px;
    }

    .il-code.muted {
      color: rgba(0, 0, 0, 0.3);
    }

    .il-label {
      font-size: 0.9em;
      line-height: 1.45;
      color: rgba(0, 0, 0, 0.65);
    }


    .il-projects-label {
      font-size: 0.7em;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.35);
      margin-bottom: 8px;
    }

    .il-projects {
      font-size: 1.05em;
      font-weight: 600;
      color: #000;
    }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #000;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95em;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 16px 28px;
      border-radius: 999px;
      transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1), gap 0.25s ease;
      flex-shrink: 0;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      gap: 18px;
    }

    .btn-start svg {
      width: 18px;
      height: 18px;
    }

    /* Retour (haut gauche) */
    #il-back {
      position: fixed;
      top: 34px;
      left: 40px;
      z-index: 3;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.72em;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.45);
      transition: color 0.2s ease;
    }

    #il-back:hover {
      color: #000;
    }

    @media (max-width: 720px) {
      #interlude {
        padding: 40px 24px;
      }

      .il-cols {
        grid-template-columns: 1fr;
        gap: 28px;
      }

    }

    /* Panneau de transition slide */
    #slide-panel {
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #000;
      transform: translateX(100%);
      pointer-events: none;
    }

    html.pf-cover #slide-panel {
      transform: translateX(0);
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      transition: opacity 0.5s ease;
    }

    #loading.done {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      display: flex;
      gap: 5px;
    }

    .loader span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #000;
      animation: pulse 1s ease-in-out infinite;
    }

    .loader span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loader span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
      }
    }
  </style>
</head>

<body>
  <button id="il-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6" />
    </svg>
    Hub
  </button>

  <div id="interlude">
    <div class="il-wrap" id="il-wrap">
      <div class="il-eyebrow">Compétence <span class="il-index" id="il-index"></span></div>
      <h1 class="il-title" id="il-title"></h1>
      <p class="il-objective" id="il-objective"></p>

      <div class="il-divider"></div>

      <div class="il-cols">
        <div>
          <div class="il-col-label">Apprentissages critiques (AC)</div>
          <div id="il-acs"></div>
        </div>
        <div>
          <div class="il-col-label">Composantes essentielles (CE)</div>
          <div id="il-ces"></div>
        </div>
      </div>
      <button class="btn-start" id="il-start" style="margin-top: 44px;">
        Commencer
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </button>
    </div>
  </div>

  <div id="loading">
    <div class="loader"><span></span><span></span><span></span></div>
  </div>

  <div id="slide-panel"></div>

  <script src="interlude.js" type="module"></script>
</body>

</html>
