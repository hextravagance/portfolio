<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio | Projets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script>
    // Avant le 1er paint : si on arrive via un slide, le panneau doit déjà couvrir.
    (function () { if (sessionStorage.getItem('pf-slide')) document.documentElement.classList.add('pf-cover'); })();
  </script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #000;
      background: #fff;
      user-select: none;
    }

    /* ── Scène 3D Cascade ── */
    #carousel-scene {
      position: fixed;
      inset: 0;
      perspective: 1600px;
      perspective-origin: 50% 45%;
      z-index: 1;
      overflow: hidden;
    }

    /* ── Cartes projet (rectangulaires 720×405) ── */
    .cascade-card {
      position: absolute;
      width: 720px;
      height: 405px;
      cursor: pointer;
      will-change: transform, opacity;
      transform-origin: center center;
    }

    .cascade-card.fade-out {
      opacity: 0 !important;
      transition: opacity 0.3s ease !important;
    }

    .cascade-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 10px rgba(0,0,0,0.05);
      transition: box-shadow 0.3s ease;
      animation: wiggle 4s ease-in-out infinite;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) translateY(0); }
      25% { transform: rotate(0.4deg) translateY(-2px); }
      50% { transform: rotate(-0.3deg) translateY(1px); }
      75% { transform: rotate(0.2deg) translateY(-1px); }
    }

    .cascade-card:hover img {
      box-shadow: 0 14px 56px rgba(0,0,0,0.18), 0 4px 18px rgba(0,0,0,0.08);
    }

    /* ── Label suivant le curseur ── */
    #cursor-label {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      font-size: 0.85em;
      font-weight: 500;
      letter-spacing: 0.3px;
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5), 0 0 2px rgba(0,0,0,0.3);
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
    }
    #cursor-label.visible { opacity: 1; }

    /* ── En-tête compétence (haut gauche) ── */
    #skill-header {
      position: fixed;
      top: 34px;
      left: 40px;
      z-index: 40;
      max-width: 360px;
    }
    #skill-header .sh-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.72em;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
      text-decoration: none;
      cursor: pointer;
      margin-bottom: 14px;
      transition: color 0.2s ease;
    }
    #skill-header .sh-back:hover { color: #000; }
    #skill-header .sh-title {
      font-size: 2.4em;
      font-weight: 800;
      letter-spacing: 1px;
      line-height: 1;
    }
    #skill-header .sh-sub {
      font-size: 0.9em;
      color: rgba(0,0,0,0.4);
      margin-top: 6px;
    }

    /* ── Compteur (bas droite) ── */
    #counter {
      position: fixed;
      bottom: 32px;
      right: 44px;
      z-index: 40;
      text-align: right;
    }
    #counter .c-name { font-size: 0.95em; font-weight: 600; margin-bottom: 4px; }
    #counter .c-accce {
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }
    #counter .c-idx {
      font-size: 0.78em;
      color: rgba(0,0,0,0.35);
      font-variant-numeric: tabular-nums;
    }

    /* ── Détail projet : éditorial plein écran 2 colonnes ── */
    #project-detail {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: #fff;
      display: flex;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }
    #project-detail.open { opacity: 1; pointer-events: auto; }

    #btn-back {
      position: fixed;
      left: 24px;
      top: 24px;
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.92);
      color: #000;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease, background 0.25s ease;
      z-index: 20;
    }
    #btn-back:hover { transform: scale(1.08); background: #fff; }
    #btn-back svg { width: 20px; height: 20px; }

    /* Colonne média (gauche) */
    .pd-media {
      width: 48%;
      flex-shrink: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 56px;
      gap: 20px;
      transform: scale(1.02);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1), opacity 0.5s ease;
    }
    #project-detail.open .pd-media { transform: scale(1); opacity: 1; }

    .pd-media-main {
      width: 100%;
      max-width: 640px;
      aspect-ratio: 16 / 9;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 18px 60px rgba(0,0,0,0.14), 0 4px 16px rgba(0,0,0,0.06);
      background: #fff;
    }
    .pd-media-main img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .pd-caption {
      font-size: 0.78em;
      letter-spacing: 0.5px;
      color: rgba(0,0,0,0.45);
      text-align: center;
    }

    .pd-thumbs { display: flex; gap: 10px; }
    .pd-thumb {
      width: 84px;
      aspect-ratio: 16 / 9;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.5;
      transition: opacity 0.2s ease, border-color 0.2s ease;
      background: #fff;
    }
    .pd-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pd-thumb:hover { opacity: 0.85; }
    .pd-thumb.active { opacity: 1; border-color: #000; }

    /* Colonne contenu (droite) */
    .pd-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 80px 72px 64px;
      transform: translateX(24px);
      opacity: 0;
      transition: transform 0.6s cubic-bezier(0.22,1,0.36,1) 0.08s, opacity 0.5s ease 0.08s;
    }
    #project-detail.open .pd-content { transform: translateX(0); opacity: 1; }
    .pd-content::-webkit-scrollbar { width: 4px; }
    .pd-content::-webkit-scrollbar-track { background: transparent; }
    .pd-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 2px; }

    .pd-eyebrow {
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      margin-bottom: 14px;
    }
    .pd-title {
      font-size: clamp(2em, 3.4vw, 2.9em);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 8px;
    }
    .pd-sub {
      font-size: 0.95em;
      color: rgba(0,0,0,0.45);
      margin-bottom: 36px;
    }
    /* ── Sections du contenu ── */
    .pd-section { margin-bottom: 30px; }
    .pd-label {
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.32);
      margin-bottom: 12px;
    }
    .pd-text {
      font-size: 1em;
      line-height: 1.65;
      color: rgba(0,0,0,0.78);
      max-width: 580px;
    }

    /* AC / CE : lignes éditoriales */
    .accce-row {
      display: flex;
      gap: 14px;
      align-items: baseline;
      padding: 10px 0;
      border-top: 1px solid rgba(0,0,0,0.08);
    }
    .accce-row:first-child { border-top: none; }
    .accce-code {
      font-size: 0.8em;
      font-weight: 800;
      letter-spacing: 0.3px;
      white-space: nowrap;
      flex-shrink: 0;
      min-width: 66px;
    }
    .accce-code.muted { color: rgba(0,0,0,0.3); }
    .accce-text { font-size: 0.9em; line-height: 1.45; color: rgba(0,0,0,0.62); }

    /* Justification : citation à filet */
    .pd-justif {
      font-size: 0.96em;
      line-height: 1.65;
      color: rgba(0,0,0,0.82);
      padding: 4px 0 4px 20px;
      border-left: 3px solid #000;
      max-width: 580px;
    }
    .pd-critique {
      font-size: 0.95em;
      line-height: 1.65;
      color: rgba(0,0,0,0.6);
      max-width: 580px;
    }
    .accce-row { max-width: 580px; }

    .pd-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag {
      font-size: 0.72em;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 12px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 999px;
      color: rgba(0,0,0,0.6);
    }

    .pd-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
    .link-btn {
      font-size: 0.85em;
      font-weight: 600;
      letter-spacing: 0.4px;
      padding: 11px 22px;
      border-radius: 999px;
      background: #000;
      color: #fff;
      text-decoration: none;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .link-btn:hover { transform: translateY(-2px); opacity: 0.85; }
    .link-btn.ghost { background: transparent; color: #000; border: 1.5px solid #000; }

    @media (max-width: 860px) {
      #project-detail { flex-direction: column; }
      .pd-media { width: 100%; padding: 64px 24px 24px; }
      .pd-content { padding: 32px 24px 48px; }
    }

    /* ── Panneau de transition slide ── */
    #slide-panel {
      position: fixed; inset: 0; z-index: 300; background: #000;
      transform: translateX(100%); pointer-events: none;
    }
    html.pf-cover #slide-panel { transform: translateX(0); }

    /* ── Bouton Conclusion ── */
    #to-conclusion {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.72em;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      transition: color 0.2s ease, gap 0.2s ease;
    }
    #to-conclusion:hover { color: #000; gap: 11px; }
    #to-conclusion svg { width: 14px; height: 14px; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
      transition: opacity 0.5s ease;
    }
    #loading.done { opacity: 0; pointer-events: none; }

    .loader { display: flex; gap: 5px; }
    .loader span {
      width: 8px; height: 8px; border-radius: 50%;
      background: #000; animation: pulse 1s ease-in-out infinite;
    }
    .loader span:nth-child(2) { animation-delay: 0.15s; }
    .loader span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>

<body>
  <div id="carousel-scene"></div>
  <div id="cursor-label"></div>

  <div id="skill-header">
    <a class="sh-back" href="index.html" id="sh-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </a>
    <div class="sh-title" id="sh-title"></div>
    <div class="sh-sub" id="sh-sub"></div>
  </div>

  <div id="counter">
    <div class="c-name" id="counter-name"></div>
    <div class="c-accce" id="counter-accce"></div>
    <div class="c-idx" id="counter-idx"></div>
  </div>

  <!-- Détail projet -->
  <div id="project-detail">
    <button id="btn-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <div class="pd-media">
      <div class="pd-media-main"><img id="pd-main-img" src="" alt="" /></div>
      <div class="pd-caption" id="pd-caption"></div>
      <div class="pd-thumbs" id="pd-thumbs"></div>
    </div>
    <div class="pd-content" id="pd-content"></div>
  </div>

  <button id="to-conclusion">
    Conclusion
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
  </button>

  <div id="loading">
    <div class="loader"><span></span><span></span><span></span></div>
  </div>

  <div id="slide-panel"></div>

  <script src="projects.js" type="module"></script>
</body>

</html>
